services:
    db:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: typer_dev
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d typer_dev"]
            interval: 2s
            timeout: 5s
            retries: 15
            start_period: 5s
        volumes:
            - pgdata:/var/lib/postgresql/data
volumes:
    pgdata:
