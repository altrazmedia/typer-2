services:
    app:
        build:
            context: .
            dockerfile: Dockerfile.dev
        ports:
            - "3000:3000"
        depends_on:
            db:
                condition: service_healthy
        environment:
            DATABASE_URL: postgresql://postgres:postgres@db:5432/typer_dev
            WATCHPACK_POLLING: "true"
            CHOKIDAR_USEPOLLING: "true"
        env_file:
            - path: .env
              required: false
            - path: .env.local
              required: false
        volumes:
            - .:/app
            - app_node_modules:/app/node_modules

volumes:
    app_node_modules:
